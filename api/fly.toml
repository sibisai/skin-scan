# fly.toml app configuration file for skinscan-api
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#
# Deployment commands:
# fly deploy --ha=false
# fly scale memory 2048 -a skinscan-api

app = 'skinscan-api'
primary_region = 'lax'

[build]

[env]
  WEIGHTS_DIR = '/app/weights'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '10s'
    grace_period = '30s'
    method = 'GET'
    path = '/health'

[[vm]]
  memory = '2gb'
  cpus = 1
